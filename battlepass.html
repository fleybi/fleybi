<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTFHub Battle Pass</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #ff006e;
            --success: #00d4ff;
            --dark: #0a0a0a;
            --card: #111118;
            --border: rgba(255,255,255,0.08);
            --text: rgba(255,255,255,0.85);
            --sub: rgba(255,255,255,0.45);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a10;
            color: #fff;
            min-height: 100vh;
        }

        /* BG */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 20% 20%, rgba(102,126,234,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 80%, rgba(118,75,162,0.06) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }

        /* LOADING */
        #loadingScreen {
            position: fixed; inset: 0;
            background: #0a0a10;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; flex-direction: column; gap: 1.5rem;
        }
        #loadingScreen h2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem; letter-spacing: 0.5rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .loader {
            width: 36px; height: 36px;
            border: 2px solid rgba(102,126,234,0.15);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* AUTH */
        .auth-container {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.97);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(20px);
        }
        .auth-container.hidden { display: none; }
        .auth-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 3rem;
            width: 90%; max-width: 400px;
            box-shadow: 0 0 80px rgba(102,126,234,0.15);
        }
        .auth-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem; text-align: center; margin-bottom: 2rem;
            letter-spacing: 0.3rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .auth-tabs { display: flex; gap: 0; margin-bottom: 2rem; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 4px; }
        .auth-tab {
            flex: 1; padding: 0.6rem; background: none; border: none;
            color: var(--sub); cursor: pointer; font-size: 0.9rem;
            letter-spacing: 0.05rem; transition: all 0.3s ease; border-radius: 8px;
            font-family: 'Inter', sans-serif;
        }
        .auth-tab.active { background: rgba(102,126,234,0.2); color: var(--primary); }
        .auth-form { display: none; }
        .auth-form.active { display: flex; flex-direction: column; gap: 1rem; animation: fadeIn 0.3s ease-in; }
        .form-input {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 10px; padding: 0.8rem 1rem; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .form-input:focus { outline: none; border-color: rgba(102,126,234,0.5); background: rgba(102,126,234,0.06); }
        .form-input::placeholder { color: var(--sub); }
        .auth-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; color: #fff; padding: 0.85rem; border-radius: 10px;
            cursor: pointer; font-size: 0.9rem; font-weight: 600; letter-spacing: 0.05rem;
            transition: all 0.3s ease; font-family: 'Rajdhani', sans-serif; font-size: 1rem; letter-spacing: 0.1rem;
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(102,126,234,0.35); }
        .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .auth-error {
            background: rgba(255,0,110,0.1); border: 1px solid rgba(255,0,110,0.3);
            color: #ff4488; padding: 0.7rem; border-radius: 8px;
            font-size: 0.85rem; text-align: center; display: none;
        }
        .auth-error.show { display: block; }
        .auth-success {
            background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
            color: var(--success); padding: 0.7rem; border-radius: 8px;
            font-size: 0.85rem; text-align: center; display: none;
        }
        .auth-success.show { display: block; }

        /* MAIN APP */
        .main-app { display: none; position: relative; z-index: 1; }
        .main-app.visible { display: block; animation: fadeIn 0.5s ease-in; }
        .inner { padding: 2rem; max-width: 1400px; margin: 0 auto; }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 2rem;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
        }
        .header-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.6rem; letter-spacing: 0.2rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .user-info { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
        .user-stats { display: flex; gap: 1.5rem; }
        .stat { text-align: center; }
        .stat-label { font-size: 0.7rem; color: var(--sub); letter-spacing: 0.1rem; margin-bottom: 0.2rem; text-transform: uppercase; }
        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .user-name { font-size: 0.85rem; color: var(--sub); }
        .user-name span { color: #fff; font-weight: 600; }
        .logout-btn {
            background: rgba(255,0,110,0.1); border: 1px solid rgba(255,0,110,0.2);
            color: #ff4488; padding: 0.4rem 0.9rem; border-radius: 6px;
            cursor: pointer; font-size: 0.8rem; transition: all 0.3s ease;
        }
        .logout-btn:hover { background: rgba(255,0,110,0.2); }

        /* SECTION */
        .section { margin-bottom: 4rem; }
        .section-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem; letter-spacing: 0.2rem; margin-bottom: 1.5rem;
            color: #fff; display: flex; align-items: center; gap: 0.7rem;
            font-weight: 600;
        }
        .section-title::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* LEVEL CARD */
        .level-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 2rem;
            margin-bottom: 2rem;
        }
        .level-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .level-info { display: flex; gap: 1.5rem; align-items: center; }
        .level-badge {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; box-shadow: 0 0 30px rgba(102,126,234,0.4);
        }
        .level-text h2 { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; margin-bottom: 0.2rem; }
        .level-text p { color: var(--sub); font-size: 0.85rem; }
        .progress-bar {
            background: rgba(0,0,0,0.4); border-radius: 8px; height: 10px; overflow: hidden;
            border: 1px solid var(--border);
        }
        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 100%; transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 0 12px rgba(102,126,234,0.5);
        }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--sub); margin-top: 0.5rem; }
        .rewards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1rem; margin-top: 2rem; }
        .reward-item {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.25rem; text-align: center;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .reward-item.unlocked { border-color: rgba(102,126,234,0.4); background: rgba(102,126,234,0.08); }
        .reward-item.unlocked::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(102,126,234,0.05), transparent);
        }
        .reward-item.locked { opacity: 0.5; }
        .reward-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .reward-name { font-size: 0.8rem; color: var(--text); margin-bottom: 0.3rem; }
        .reward-level { font-size: 0.7rem; color: var(--primary); letter-spacing: 0.05rem; }

        /* ====== TASK CARDS — BEAUTIFUL ====== */
        .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }

        .task-card {
            position: relative; border-radius: 16px; overflow: hidden;
            background: var(--card);
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            cursor: default;
        }
        .task-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(102,126,234,0.06) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.4s;
        }
        .task-card:hover { transform: translateY(-6px); border-color: rgba(102,126,234,0.3); box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(102,126,234,0.1); }
        .task-card:hover::before { opacity: 1; }

        /* shimmer on hover */
        .task-card::after {
            content: ''; position: absolute;
            top: -50%; left: -60%; width: 50%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s ease;
        }
        .task-card:hover::after { left: 130%; }

        .task-card-inner { padding: 1.5rem; position: relative; z-index: 1; }

        .task-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .task-icon-wrap {
            width: 48px; height: 48px; border-radius: 12px;
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
            border: 1px solid rgba(102,126,234,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
            flex-shrink: 0;
        }
        .task-badge {
            font-size: 0.68rem; padding: 0.3rem 0.65rem; border-radius: 20px;
            letter-spacing: 0.06rem; font-weight: 600; text-transform: uppercase;
        }
        .task-badge.active { background: rgba(102,126,234,0.15); color: var(--primary); border: 1px solid rgba(102,126,234,0.25); }
        .task-badge.pending { background: rgba(255,170,0,0.15); color: #ffaa00; border: 1px solid rgba(255,170,0,0.25); }
        .task-badge.approved { background: rgba(0,212,100,0.15); color: #00d464; border: 1px solid rgba(0,212,100,0.25); }
        .task-badge.rejected { background: rgba(255,0,110,0.15); color: #ff4488; border: 1px solid rgba(255,0,110,0.25); }

        .task-name { font-family: 'Rajdhani', sans-serif; font-size: 1.15rem; font-weight: 600; margin-bottom: 0.4rem; }
        .task-desc { font-size: 0.82rem; color: var(--sub); line-height: 1.5; margin-bottom: 1.25rem; }

        .task-rewards-row { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; }
        .task-reward-pill {
            display: flex; align-items: center; gap: 0.4rem;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.35rem 0.7rem; font-size: 0.8rem; color: var(--text);
        }
        .task-reward-pill span { font-weight: 600; color: #fff; }

        /* divider */
        .task-divider { height: 1px; background: var(--border); margin-bottom: 1.25rem; }

        .task-submit-btn {
            width: 100%; padding: 0.8rem; border-radius: 10px; border: none;
            font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: 0.08rem;
            cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .task-submit-btn.can-submit {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
        }
        .task-submit-btn.can-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .task-submit-btn.is-pending { background: rgba(255,170,0,0.1); border: 1px solid rgba(255,170,0,0.3); color: #ffaa00; cursor: not-allowed; }
        .task-submit-btn.is-approved { background: rgba(0,212,100,0.1); border: 1px solid rgba(0,212,100,0.3); color: #00d464; cursor: not-allowed; }
        .task-submit-btn.is-rejected { background: rgba(255,0,110,0.1); border: 1px solid rgba(255,0,110,0.3); color: #ff4488; cursor: pointer; }
        .task-submit-btn.is-rejected:hover { background: rgba(255,0,110,0.18); }

        /* SHOP */
        .shop-filters { display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .filter-btn {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--sub);
            padding: 0.45rem 1.1rem; border-radius: 20px; cursor: pointer;
            font-size: 0.82rem; transition: all 0.3s ease;
        }
        .filter-btn.active { background: rgba(102,126,234,0.15); border-color: rgba(102,126,234,0.4); color: var(--primary); }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1.25rem; }
        .shop-item {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 1.5rem; text-align: center; transition: all 0.3s ease;
        }
        .shop-item:hover { border-color: rgba(255,0,110,0.3); transform: translateY(-4px); box-shadow: 0 15px 35px rgba(0,0,0,0.3), 0 0 20px rgba(255,0,110,0.08); }
        .shop-icon { font-size: 2.2rem; margin-bottom: 0.75rem; }
        .shop-name { font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; }
        .shop-desc { font-size: 0.75rem; color: var(--sub); margin-bottom: 1rem; min-height: 2.2rem; line-height: 1.4; }
        .shop-price { display: flex; align-items: center; justify-content: center; gap: 0.4rem; font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; color: var(--accent); }
        .shop-btn {
            width: 100%; background: linear-gradient(135deg, var(--accent), #ff1744);
            border: none; color: #fff; padding: 0.65rem; border-radius: 8px;
            cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; font-weight: 600; letter-spacing: 0.05rem;
            transition: all 0.3s ease;
        }
        .shop-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,0,110,0.3); }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 500; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        .modal-content {
            background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 2rem;
            width: 90%; max-width: 480px; box-shadow: 0 0 60px rgba(102,126,234,0.2);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; font-weight: 600; }
        .close-modal { background: none; border: none; color: var(--sub); font-size: 1.3rem; cursor: pointer; transition: color 0.2s; }
        .close-modal:hover { color: #fff; }

        /* NOTIFICATION */
        .notification {
            position: fixed; bottom: 2rem; right: 2rem;
            background: var(--card); border: 1px solid var(--border);
            color: #fff; padding: 1rem 1.5rem; border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideIn 0.4s cubic-bezier(0.4,0,0.2,1);
            z-index: 600; max-width: 320px; font-size: 0.9rem;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(350px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 1rem; padding: 1rem; }
            .user-stats { justify-content: center; gap: 1rem; }
            .tasks-grid { grid-template-columns: 1fr; }
            .shop-grid { grid-template-columns: repeat(2, 1fr); }
            .inner { padding: 1rem; }
        }
    </style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
    <h2>BATTLE PASS</h2>
    <div class="loader"></div>
</div>

<!-- AUTH -->
<div class="auth-container hidden" id="authContainer">
    <div class="auth-box">
        <h1 class="auth-title">BATTLE PASS</h1>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login', event)">Вход</button>
            <button class="auth-tab" onclick="switchTab('register', event)">Регистрация</button>
        </div>
        <div class="auth-error" id="authError"></div>
        <div class="auth-success" id="authSuccess"></div>

        <div class="auth-form active" id="loginForm">
            <input type="email" class="form-input" placeholder="Email" id="loginEmail">
            <input type="password" class="form-input" placeholder="Пароль" id="loginPassword">
            <button class="auth-btn" id="loginBtn" onclick="handleLogin()">ВОЙТИ</button>
        </div>

        <div class="auth-form" id="registerForm">
            <input type="text" class="form-input" placeholder="Ник (отображается в игре)" id="registerUsername">
            <input type="email" class="form-input" placeholder="Email" id="registerEmail">
            <input type="password" class="form-input" placeholder="Пароль (мин. 6 символов)" id="registerPassword">
            <input type="password" class="form-input" placeholder="Подтверди пароль" id="registerPasswordConfirm">
            <button class="auth-btn" id="registerBtn" onclick="handleRegister()">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div class="main-app" id="mainApp">
    <div class="header">
        <h1 class="header-title">⚔️ TTFHub Battle Pass</h1>
        <div class="user-info">
            <div class="user-stats">
                <div class="stat">
                    <div class="stat-label">Уровень</div>
                    <div class="stat-value" id="userLevel">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">XP</div>
                    <div class="stat-value" id="userXP">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Coins</div>
                    <div class="stat-value" id="userCoins">0</div>
                </div>
            </div>
            <div>
                <div class="user-name">👤 <span id="userName">Player</span></div>
                <button class="logout-btn" onclick="logout()" style="margin-top:0.4rem;">Выход</button>
            </div>
        </div>
    </div>

    <div class="inner">
        <!-- БАТЛПАС -->
        <div class="section">
            <h2 class="section-title">⭐ Батлпас · Сезон 1</h2>
            <div class="level-card">
                <div class="level-header">
                    <div class="level-info">
                        <div class="level-badge" id="levelBadge">⭐</div>
                        <div class="level-text">
                            <h2>Уровень <span id="currentLevel">1</span></h2>
                            <p>Выполняй задания — открывай награды</p>
                        </div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
                <div class="progress-text">
                    <span id="xpText">0 / 500 XP</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="rewards-grid" id="rewardsGrid"></div>
            </div>
        </div>

        <!-- ЗАДАНИЯ -->
        <div class="section">
            <h2 class="section-title">📋 Задания</h2>
            <div class="tasks-grid" id="tasksGrid"></div>
        </div>

        <!-- МАГАЗИН -->
        <div class="section">
            <h2 class="section-title">🛍️ Магазин</h2>
            <div class="shop-filters" id="shopFilters"></div>
            <div class="shop-grid" id="shopGrid"></div>
        </div>
    </div>
</div>

<!-- MODAL покупки -->
<div class="modal" id="purchaseModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">Подтверждение покупки</h2>
            <button class="close-modal" onclick="closePurchaseModal()">✕</button>
        </div>
        <div id="purchaseDetails"></div>
    </div>
</div>

<script>
    // ===== SUPABASE =====
    const SUPABASE_URL = 'https://ozgrmhowxhojxtqbhbtz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96Z3JtaG93eGhvanh0cWJoYnR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDYwNjMsImV4cCI6MjA5MDEyMjA2M30.Cf8OMf6bJ8u0OhBw-4NOj5jr7dfHBkjjX9WtM4fBrGQ';
    const RESEND_KEY = 're_8gsEf9Yr_3yMzi3pCZHTDJUaUurv7KYV1';
    const ADMIN_EMAIL = 'niksowhat1@gmail.com';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUserData = null;
    let taskSubmissions = {}; // taskId -> submission status

    // ===== GAME CONFIG (может быть переопределён из Supabase) =====
    const defaultTasks = [
        { id: 't1', icon: '🎯', name: 'Приветствие', desc: 'Зайди в систему и представься клану', xp: 50, coins: 20 },
        { id: 't2', icon: '🎮', name: 'Игровой день', desc: 'Сыграй 3 матча в течение дня', xp: 100, coins: 50 },
        { id: 't3', icon: '🏆', name: 'Победитель', desc: 'Одержи 5 побед за неделю', xp: 150, coins: 80 },
        { id: 't4', icon: '👥', name: 'Рекрут', desc: 'Пригласи нового участника в клан', xp: 200, coins: 100 },
        { id: 't5', icon: '🎙️', name: 'Стример', desc: 'Выйди в стрим с кланом', xp: 250, coins: 120 },
        { id: 't6', icon: '👑', name: 'Легенда', desc: 'Достигни топ-10 в рейтинге клана', xp: 500, coins: 200 },
    ];

    const gameConfig = {
        levels: 100,
        xpPerLevel: 500,
        tasks: defaultTasks,
        shopItems: [
            { id: 1, name: 'VIP Роль', icon: '👑', desc: 'Эксклюзивная роль в Discord', price: 500, category: 'roles' },
            { id: 2, name: 'Elite Роль', icon: '💎', desc: 'Премиум статус в клане', price: 1000, category: 'roles' },
            { id: 3, name: 'Закрытый Чат', icon: '🔒', desc: 'Приватный канал VIP', price: 300, category: 'access' },
            { id: 4, name: 'Приватные Игры', icon: '🎮', desc: 'Закрытые игровые сеансы', price: 700, category: 'access' },
            { id: 5, name: 'Цвет Ника', icon: '🎨', desc: 'Кастомизируй ник цветом', price: 200, category: 'cosmetics' },
            { id: 6, name: 'Рамка Профиля', icon: '🖼️', desc: 'Красивая рамка вокруг профиля', price: 400, category: 'cosmetics' },
            { id: 7, name: 'Значки', icon: '🏅', desc: 'Эксклюзивные значки', price: 150, category: 'cosmetics' },
            { id: 8, name: 'x2 XP Буст', icon: '⚡', desc: 'Двойной опыт на 24 часа', price: 400, category: 'boosters' },
            { id: 9, name: 'Буст Батлпаса', icon: '🚀', desc: 'Ускори прогресс батлпаса', price: 800, category: 'boosters' },
            { id: 10, name: 'Донат скидка', icon: '💳', desc: '10% скидка на Фантайм', price: 250, category: 'access' },
        ]
    };

    // ===== INIT =====
    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            await loadUserProfile(session.user);
        } else {
            showAuth();
        }
        document.getElementById('loadingScreen').style.display = 'none';

        // Загружаем задания из Supabase если есть
        try {
            const { data } = await sb.from('site_config').select('value').eq('key', 'tasks').single();
            if (data?.value) {
                const parsed = typeof data.value === 'string' ? JSON.parse(data.value) : data.value;
                if (Array.isArray(parsed)) gameConfig.tasks = parsed;
            }
        } catch(e) {}
    }

    async function loadUserProfile(authUser) {
        const { data, error } = await sb.from('profiles').select('*').eq('id', authUser.id).single();
        if (error || !data) {
            const newProfile = {
                id: authUser.id,
                username: authUser.user_metadata?.username || authUser.email.split('@')[0],
                level: 1, xp: 0, coins: 0, total_xp: 0,
                tasks_completed: [], purchases: [], inventory: []
            };
            await sb.from('profiles').insert(newProfile);
            currentUserData = newProfile;
        } else {
            currentUserData = data;
        }
        await loadSubmissions();
        showApp();
    }

    async function loadSubmissions() {
        if (!currentUserData) return;
        const { data } = await sb.from('task_submissions')
            .select('*').eq('user_id', currentUserData.id);
        taskSubmissions = {};
        if (data) data.forEach(s => { taskSubmissions[s.task_id] = s; });
    }

    // ===== AUTH =====
    function switchTab(tab, event) {
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tab + 'Form').classList.add('active');
        event.target.classList.add('active');
        clearMessages();
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { showError('Заполни все поля'); return; }
        const btn = document.getElementById('loginBtn');
        btn.disabled = true; btn.textContent = 'ВХОДИМ...';
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { showError('Неверный email или пароль'); btn.disabled = false; btn.textContent = 'ВОЙТИ'; return; }
        await loadUserProfile(data.user);
    }

    async function handleRegister() {
        const username = document.getElementById('registerUsername').value.trim();
        const email = document.getElementById('registerEmail').value.trim();
        const password = document.getElementById('registerPassword').value;
        const confirm = document.getElementById('registerPasswordConfirm').value;
        if (!username || !email || !password) { showError('Заполни все поля'); return; }
        if (username.length < 3) { showError('Ник минимум 3 символа'); return; }
        if (password.length < 6) { showError('Пароль минимум 6 символов'); return; }
        if (password !== confirm) { showError('Пароли не совпадают'); return; }
        const btn = document.getElementById('registerBtn');
        btn.disabled = true; btn.textContent = 'СОЗДАЁМ...';
        const { data: existing } = await sb.from('profiles').select('id').eq('username', username).single();
        if (existing) { showError('Ник уже занят, выбери другой'); btn.disabled = false; btn.textContent = 'СОЗДАТЬ АККАУНТ'; return; }
        const { data, error } = await sb.auth.signUp({ email, password, options: { data: { username } } });
        if (error) { showError(error.message === 'User already registered' ? 'Email уже занят' : 'Ошибка регистрации'); btn.disabled = false; btn.textContent = 'СОЗДАТЬ АККАУНТ'; return; }
        if (data.user) {
            await loadUserProfile(data.user);
        } else {
            showSuccess('✅ Проверь почту для подтверждения!');
            btn.disabled = false; btn.textContent = 'СОЗДАТЬ АККАУНТ';
        }
    }

    async function logout() {
        if (confirm('Выйти из аккаунта?')) {
            await sb.auth.signOut();
            currentUserData = null;
            document.getElementById('mainApp').classList.remove('visible');
            showAuth();
        }
    }

    // ===== TASK SUBMISSION =====
    async function submitTask(taskId) {
        const task = gameConfig.tasks.find(t => t.id === taskId);
        if (!task) return;

        const sub = taskSubmissions[taskId];
        if (sub && sub.status === 'pending') { showNotification('⏳ Уже на проверке, ожидай!'); return; }
        if (sub && sub.status === 'approved') return;

        // Если rejected — можно отправить снова (удалим старую запись)
        if (sub && sub.status === 'rejected') {
            await sb.from('task_submissions').delete().eq('id', sub.id);
        }

        const { data, error } = await sb.from('task_submissions').insert({
            user_id: currentUserData.id,
            username: currentUserData.username,
            task_id: taskId,
            task_title: task.name,
            reward_coins: task.coins,
            reward_xp: task.xp,
            status: 'pending'
        }).select().single();

        if (error) { showNotification('❌ Ошибка отправки'); return; }
        taskSubmissions[taskId] = data;

        // Уведомление на почту
        sendAdminEmail(task);

        showNotification('📤 Задание отправлено на проверку!');
        renderTasks();
    }

    async function sendAdminEmail(task) {
        try {
            await fetch('https://api.resend.com/emails', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${RESEND_KEY}` },
                body: JSON.stringify({
                    from: 'battlepass@resend.dev',
                    to: ADMIN_EMAIL,
                    subject: `📋 Новая заявка: ${task.name} — от ${currentUserData.username}`,
                    html: `
                        <div style="font-family:Arial,sans-serif;background:#0a0a10;color:#fff;padding:2rem;border-radius:12px;max-width:500px;">
                            <h2 style="color:#667eea;">⚔️ TTFHub Battle Pass</h2>
                            <p>Новая заявка на проверку задания:</p>
                            <div style="background:#111118;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:1rem;margin:1rem 0;">
                                <b>Игрок:</b> ${currentUserData.username}<br>
                                <b>Задание:</b> ${task.name}<br>
                                <b>Описание:</b> ${task.desc}<br>
                                <b>Награда:</b> ${task.xp} XP + ${task.coins} Coins
                            </div>
                            <a href="https://fleybi.space/ttfhub/admin.html" style="display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:0.75rem 1.5rem;border-radius:8px;text-decoration:none;font-weight:bold;">
                                Открыть панель администратора
                            </a>
                        </div>
                    `
                })
            });
        } catch(e) { console.log('Email error:', e); }
    }

    // ===== GAME LOGIC =====
    async function saveProfile() {
        await sb.from('profiles').update({
            level: currentUserData.level, xp: currentUserData.xp,
            coins: currentUserData.coins, total_xp: currentUserData.total_xp,
            tasks_completed: currentUserData.tasks_completed,
            purchases: currentUserData.purchases, inventory: currentUserData.inventory
        }).eq('id', currentUserData.id);
        renderUI();
    }

    async function addXP(amount) {
        currentUserData.xp += amount;
        currentUserData.total_xp = (currentUserData.total_xp || 0) + amount;
        while (currentUserData.xp >= gameConfig.xpPerLevel && currentUserData.level < gameConfig.levels) {
            currentUserData.xp -= gameConfig.xpPerLevel;
            currentUserData.level++;
            showNotification(`🎉 Уровень ${currentUserData.level} разблокирован!`);
        }
        await saveProfile();
    }

    async function buyItem(itemId) {
        const item = gameConfig.shopItems.find(i => i.id === itemId);
        if (!item) return;
        if (currentUserData.coins < item.price) { showNotification('❌ Недостаточно Coins!'); return; }
        showPurchaseModal(item, async () => {
            currentUserData.coins -= item.price;
            if (!currentUserData.inventory) currentUserData.inventory = [];
            if (!currentUserData.purchases) currentUserData.purchases = [];
            currentUserData.inventory.push({ id: item.id, name: item.name, purchasedAt: Date.now() });
            currentUserData.purchases.push(item.id);
            await saveProfile();
            showNotification(`✅ Куплено: ${item.name}`);
            closePurchaseModal();
        });
    }

    // ===== RENDER =====
    function renderUI() {
        if (!currentUserData) return;
        document.getElementById('userName').textContent = currentUserData.username;
        document.getElementById('userLevel').textContent = currentUserData.level;
        document.getElementById('userXP').textContent = (currentUserData.total_xp || 0).toLocaleString();
        document.getElementById('userCoins').textContent = currentUserData.coins;
        document.getElementById('currentLevel').textContent = currentUserData.level;
        document.getElementById('levelBadge').textContent = ['⭐','🌟','💫','✨','🔥'][currentUserData.level % 5];
        const pct = (currentUserData.xp / gameConfig.xpPerLevel) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('xpText').textContent = `${currentUserData.xp} / ${gameConfig.xpPerLevel} XP`;
        document.getElementById('progressPercent').textContent = Math.round(pct) + '%';
        renderRewards();
        renderTasks();
        renderShop();
    }

    function renderRewards() {
        const rewards = [
            { level:1, icon:'🎁', name:'100 Coins' }, { level:5, icon:'🏅', name:'Значок' },
            { level:10, icon:'👑', name:'VIP Роль' }, { level:25, icon:'💎', name:'Elite Роль' },
            { level:50, icon:'🚀', name:'Буст 2x XP' }, { level:100, icon:'👿', name:'Легенда' },
        ];
        document.getElementById('rewardsGrid').innerHTML = rewards.map(r => `
            <div class="reward-item ${currentUserData.level >= r.level ? 'unlocked' : 'locked'}">
                <div class="reward-icon">${r.icon}</div>
                <div class="reward-name">${r.name}</div>
                <div class="reward-level">УР. ${r.level}</div>
            </div>
        `).join('');
    }

    function renderTasks() {
        document.getElementById('tasksGrid').innerHTML = gameConfig.tasks.map(task => {
            const sub = taskSubmissions[task.id];
            const isApproved = sub?.status === 'approved';
            const isPending = sub?.status === 'pending';
            const isRejected = sub?.status === 'rejected';

            let badgeClass, badgeText, btnClass, btnText;
            if (isApproved) {
                badgeClass = 'approved'; badgeText = '✓ Выполнено';
                btnClass = 'is-approved'; btnText = '✓ ОДОБРЕНО';
            } else if (isPending) {
                badgeClass = 'pending'; badgeText = '⏳ На проверке';
                btnClass = 'is-pending'; btnText = '⏳ НА ПРОВЕРКЕ';
            } else if (isRejected) {
                badgeClass = 'rejected'; badgeText = '✕ Отклонено';
                btnClass = 'is-rejected'; btnText = '🔄 ОТПРАВИТЬ СНОВА';
            } else {
                badgeClass = 'active'; badgeText = 'АКТИВНО';
                btnClass = 'can-submit'; btnText = '📤 ОТПРАВИТЬ НА ПРОВЕРКУ';
            }

            const clickable = !isApproved && !isPending;

            return `
            <div class="task-card">
                <div class="task-card-inner">
                    <div class="task-top">
                        <div class="task-icon-wrap">${task.icon || '🎯'}</div>
                        <div class="task-badge ${badgeClass}">${badgeText}</div>
                    </div>
                    <div class="task-name">${task.name}</div>
                    <div class="task-desc">${task.desc}</div>
                    <div class="task-rewards-row">
                        <div class="task-reward-pill">⭐ <span>+${task.xp} XP</span></div>
                        <div class="task-reward-pill">💰 <span>+${task.coins}</span></div>
                    </div>
                    <div class="task-divider"></div>
                    <button class="task-submit-btn ${btnClass}" ${!clickable ? 'disabled' : ''} onclick="submitTask('${task.id}')">
                        ${btnText}
                    </button>
                    ${isRejected && sub?.reject_reason ? `<div style="margin-top:0.6rem;font-size:0.78rem;color:#ff4488;">Причина: ${sub.reject_reason}</div>` : ''}
                </div>
            </div>`;
        }).join('');
    }

    function renderShop(category = 'roles') {
        const cats = ['roles','access','cosmetics','boosters'];
        document.getElementById('shopFilters').innerHTML = cats.map(cat => `
            <button class="filter-btn ${cat === category ? 'active' : ''}" onclick="renderShop('${cat}')">
                ${{ roles:'👑 Роли', access:'🔓 Доступы', cosmetics:'🎨 Визуал', boosters:'⚡ Бусты' }[cat]}
            </button>
        `).join('');
        document.getElementById('shopGrid').innerHTML = gameConfig.shopItems.filter(i => i.category === category).map(item => `
            <div class="shop-item">
                <div class="shop-icon">${item.icon}</div>
                <div class="shop-name">${item.name}</div>
                <div class="shop-desc">${item.desc}</div>
                <div class="shop-price">💰 ${item.price}</div>
                <button class="shop-btn" onclick="buyItem(${item.id})">КУПИТЬ</button>
            </div>
        `).join('');
    }

    function showPurchaseModal(item, onConfirm) {
        document.getElementById('purchaseDetails').innerHTML = `
            <div style="text-align:center;padding:1.5rem 0;">
                <div style="font-size:3rem;margin-bottom:1rem;">${item.icon}</div>
                <h3 style="font-family:'Rajdhani',sans-serif;font-size:1.4rem;margin-bottom:0.5rem;">${item.name}</h3>
                <p style="color:rgba(255,255,255,0.5);margin-bottom:1.5rem;">${item.desc}</p>
                <div style="background:rgba(255,0,110,0.08);border:1px solid rgba(255,0,110,0.2);padding:1rem;border-radius:10px;margin-bottom:1.5rem;">
                    <div style="font-size:0.8rem;color:rgba(255,255,255,0.5);">СТОИМОСТЬ</div>
                    <div style="font-size:2rem;font-weight:700;color:#ff4488;">💰 ${item.price}</div>
                </div>
                <div style="display:flex;gap:0.75rem;">
                    <button class="auth-btn" style="flex:1;" id="confirmPurchaseBtn">КУПИТЬ</button>
                    <button class="auth-btn" style="flex:1;background:rgba(255,255,255,0.06);" onclick="closePurchaseModal()">ОТМЕНА</button>
                </div>
            </div>`;
        document.getElementById('confirmPurchaseBtn').onclick = onConfirm;
        document.getElementById('purchaseModal').classList.add('active');
    }

    function closePurchaseModal() { document.getElementById('purchaseModal').classList.remove('active'); }

    function showApp() {
        document.getElementById('authContainer').classList.add('hidden');
        document.getElementById('mainApp').classList.add('visible');
        renderUI();
    }
    function showAuth() {
        document.getElementById('authContainer').classList.remove('hidden');
        document.getElementById('mainApp').classList.remove('visible');
    }
    function showError(msg) { const el = document.getElementById('authError'); el.textContent = msg; el.classList.add('show'); document.getElementById('authSuccess').classList.remove('show'); }
    function showSuccess(msg) { const el = document.getElementById('authSuccess'); el.textContent = msg; el.classList.add('show'); document.getElementById('authError').classList.remove('show'); }
    function clearMessages() { document.getElementById('authError').classList.remove('show'); document.getElementById('authSuccess').classList.remove('show'); }

    function showNotification(msg) {
        const n = document.createElement('div');
        n.className = 'notification'; n.textContent = msg;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3500);
    }

    init();
</script>
</body>
</html>
