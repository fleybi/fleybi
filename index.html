<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleybi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
        }

        /* Главная секция с видео фоном */
        .main-section {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* Видео фон */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* Затемнение поверх видео для читаемости текста */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
        }

        h1 {
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: 0.3rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 10px rgba(255, 255, 255, 0.5);
            animation: fadeIn 2s ease-in;
        }

        .links {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
        }

        .links a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 0.2rem;
            padding: 0.5rem 0;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .links a:hover {
            color: #aaa;
        }

        .links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: #fff;
            transition: width 0.3s ease;
        }

        .links a:hover::after {
            width: 100%;
        }

        /* Стрелка вниз для скролла */
        .scroll-arrow {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            animation: bounce 2s infinite;
            z-index: 10;
        }

        .scroll-arrow svg {
            width: 60px;
            height: 60px;
            fill: #fff;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.9));
        }

        /* Секция с видеороликом */
        .video-section {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
        }

        .video-title {
            font-size: 3.5rem;
            color: #fff;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: 300;
            letter-spacing: 0.3rem;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .video-subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 3rem;
            text-align: center;
            letter-spacing: 0.1rem;
        }

        .video-player {
            width: 90%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
        }

        .video-player iframe {
            width: 100%;
            height: 100%;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        .modal-content {
            background: rgba(20, 20, 20, 0.95);
            padding: 3rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 600px;
            text-align: center;
            position: relative;
        }

        /* Новый стиль для полноэкранного контента */
        .modal-content-fullscreen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            transition: color 0.3s ease;
            z-index: 101;
        }

        .close:hover {
            color: #aaa;
        }

        .modal-content h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            letter-spacing: 0.2rem;
            font-weight: 300;
        }

        /* Фотография в About - полноэкранная версия */
        .about-photo-fullscreen {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 20px;
        }

        /* Контейнер для картинки соцсетей */
        .socials-image-container {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .socials-background {
            max-width: 100%;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 20px;
        }

        /* Невидимые кликабельные области */
        .social-hotspot {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-hotspot:hover {
            transform: scale(1.1);
        }

        /* Позиции для каждой иконки (настроены под твою картинку) */
        .youtube-hotspot {
            top: 35%;
            left: 50%;
            width: 10%;
            height: 15%;
            transform: translateX(-50%);
        }

        .vk-hotspot {
            top: 35%;
            left: 61%;
            width: 10%;
            height: 15%;
            transform: translateX(-50%);
        }

        .telegram-hotspot {
            top: 35%;
            left: 72%;
            width: 10%;
            height: 15%;
            transform: translateX(-50%);
        }

        .discord-hotspot {
            top: 35%;
            left: 83%;
            width: 10%;
            height: 15%;
            transform: translateX(-50%);
        }

        .modal-content p {
            font-size: 1.1rem;
            line-height: 1.8;
            letter-spacing: 0.05rem;
            color: #ddd;
        }

        /* Панель управления внизу справа */
        .controls-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: flex-end;
        }

        /* Контролы видео (звук + кнопки) */
        .video-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        /* Регулятор громкости */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* Discord кнопка слева снизу */
        .discord-promo {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            opacity: 1;
        }

        .discord-promo a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(88, 101, 242, 0.3), rgba(67, 77, 196, 0.3));
            border: 2px solid rgba(88, 101, 242, 0.6);
            border-radius: 30px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        .discord-promo a:hover {
            background: linear-gradient(135deg, rgba(88, 101, 242, 0.5), rgba(67, 77, 196, 0.5));
            border-color: rgba(88, 101, 242, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.5);
        }

        .discord-promo svg {
            width: 32px;
            height: 32px;
            fill: #fff;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .discord-promo-text {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-20px);
            }
            60% {
                transform: translateX(-50%) translateY(-10px);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }
            .links {
                flex-direction: column;
                gap: 1rem;
            }
            .modal-content {
                margin: 20px;
                padding: 2rem;
                max-width: 90%;
            }
            .controls-panel {
                bottom: 20px;
                right: 20px;
            }
            .video-controls {
                padding: 8px 12px;
            }
            .control-btn {
                width: 40px;
                height: 40px;
            }
            .control-btn svg {
                width: 18px;
                height: 18px;
            }
            .volume-slider {
                width: 80px;
            }
            .discord-promo {
                bottom: 100px;
                left: 20px;
            }
            .discord-promo a {
                padding: 10px 16px;
            }
            .discord-promo svg {
                width: 28px;
                height: 28px;
            }
            .discord-promo-text {
                font-size: 0.8rem;
            }
            .video-title {
                font-size: 2rem;
            }
            .video-subtitle {
                font-size: 1rem;
            }
            .video-player {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <!-- Главная секция с видео фоном -->
    <section class="main-section">
        <!-- Видео фон -->
        <div class="video-background">
            <video id="bgVideo" loop playsinline></video>
        </div>
        <div class="overlay"></div>

        <div class="container">
            <h1>Fleybi</h1>
            <div class="links">
                <a id="aboutLink">Обо мне</a>
                <a id="socialsLink">Мои соцсети</a>
            </div>
        </div>

        <!-- Стрелка для скролла вниз -->
        <div class="scroll-arrow" onclick="scrollToVideo()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 10l5 5 5-5z"/>
            </svg>
        </div>

        <!-- Панель управления -->
        <div class="controls-panel">
            <div class="video-controls">
                <!-- Предыдущее видео -->
                <div class="control-btn" id="prevBtn" title="Предыдущее видео">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </div>

                <!-- Следующее видео -->
                <div class="control-btn" id="nextBtn" title="Следующее видео">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </div>

                <!-- Управление звуком -->
                <div class="volume-control">
                    <div class="control-btn" id="soundToggle" title="Вкл/Выкл звук">
                        <svg id="soundIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                        </svg>
                    </div>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="50" title="Громкость">
                </div>
            </div>
        </div>

        <!-- Discord кнопка слева снизу -->
        <div class="discord-promo">
            <a href="https://discord.gg/ТВОЯ_ССЫЛКА_НА_ДИСКОРД" target="_blank" title="Join Discord">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
                <span class="discord-promo-text">МОЙ КЛАН</span>
            </a>
        </div>
    </section>

    <!-- Секция с видеороликом -->
    <section class="video-section" id="videoSection">
        <h2 class="video-title">МОИ ВИДЕОРОЛИКИ</h2>
        <p class="video-subtitle">Смотри мои лучшие ролики на YouTube</p>
        <div class="video-player">
            <iframe 
                src="https://www.youtube.com/embed/Dut3saE7rZM" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </section>

    <!-- Модальное окно About - ПОЛНОЭКРАННАЯ КАРТИНКА -->
    <div id="aboutModal" class="modal">
        <div class="modal-content-fullscreen">
            <span class="close" id="closeAbout">&times;</span>
            <img src="fleybi.png" alt="Fleybi" class="about-photo-fullscreen">
        </div>
    </div>

    <!-- Модальное окно Socials -->
    <div id="socialsModal" class="modal">
        <div class="modal-content-fullscreen">
            <span class="close" id="closeSocials">&times;</span>
            <div class="socials-image-container">
                <img src="socials.png" alt="Мои соцсети" class="socials-background">
                <!-- Невидимые кликабельные области -->
                <a href="https://youtube.com/@fleybi" target="_blank" class="social-hotspot youtube-hotspot"></a>
                <a href="https://vk.com/fleybov" target="_blank" class="social-hotspot vk-hotspot"></a>
                <a href="https://t.me/fleybi" target="_blank" class="social-hotspot telegram-hotspot"></a>
                <a href="https://discord.gg/your-discord" target="_blank" class="social-hotspot discord-hotspot"></a>
            </div>
        </div>
    </div>

    <script>
        // Скролл к секции с видео
        function scrollToVideo() {
            document.getElementById('videoSection').scrollIntoView({ behavior: 'smooth' });
        }

        // Список видео
        const videos = [
            'fire_alarm.mp4',
            'are_you_happy.mp4',
            'lovesong.mp4',
            'alabaster.mp4',
            'scally.mp4',
            'villan.mp4',
            'rocket.mp4'
        ];

        const bgVideo = document.getElementById('bgVideo');
        const soundToggle = document.getElementById('soundToggle');
        const soundIcon = document.getElementById('soundIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // Получаем индекс последнего видео из localStorage
        let currentVideoIndex = parseInt(localStorage.getItem('videoIndex') || '0');

        // Музыка включена по умолчанию
        let isMuted = false;

        // Функция для загрузки видео
        function loadVideo(index) {
            currentVideoIndex = index;
            bgVideo.src = videos[currentVideoIndex];
            bgVideo.volume = 0.5; // Громкость 50% по умолчанию
            bgVideo.muted = false; // Звук включен
            
            // Воспроизводим с обработкой ошибок
            const playPromise = bgVideo.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log('Autoplay prevented:', error);
                    // Если браузер блокирует автовоспроизведение со звуком
                    bgVideo.muted = true;
                    isMuted = true;
                    volumeSlider.value = 0;
                    soundIcon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
                    bgVideo.play();
                });
            }
            
            // Сохраняем следующий индекс
            const nextIndex = (currentVideoIndex + 1) % videos.length;
            localStorage.setItem('videoIndex', nextIndex);
        }

        // Загружаем текущее видео при старте
        loadVideo(currentVideoIndex);

        // Кнопка "Следующее видео"
        nextBtn.addEventListener('click', () => {
            const nextIndex = (currentVideoIndex + 1) % videos.length;
            loadVideo(nextIndex);
        });

        // Кнопка "Предыдущее видео"
        prevBtn.addEventListener('click', () => {
            const prevIndex = (currentVideoIndex - 1 + videos.length) % videos.length;
            loadVideo(prevIndex);
        });

        // Управление звуком (вкл/выкл)
        soundToggle.addEventListener('click', () => {
            isMuted = !isMuted;
            bgVideo.muted = isMuted;
            
            if (isMuted) {
                volumeSlider.value = 0;
                soundIcon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
            } else {
                volumeSlider.value = 50;
                bgVideo.volume = 0.5;
